name: Email AI Intelligence Report

on:
  push:
    paths:
      - 'anthropic-research/email-trigger-*.txt'
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD)'
        required: true
        default: '2026-06-19'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdown
        run: pip install markdown

      - name: Build email payload
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date || '2026-06-19' }}
        run: |
          python3 << 'PYEOF' > /tmp/email.json
          import json, os, re
          from datetime import date, timedelta

          today = os.environ.get('REPORT_DATE') or date.today().isoformat()
          start = (date.fromisoformat(today) - timedelta(days=30)).isoformat()

          report_path = f"anthropic-research/sessions-{today}.md"
          try:
              with open(report_path, 'r') as f:
                  body = f.read()
          except FileNotFoundError:
              body = ''

          if not body.strip():
              status = 'NOT STARTED'; items = 0
              report_html = '<p>No report file was generated for today yet.</p>'
          else:
              m = re.search(r'Status\**:?\**\s*(COMPLETE|IN PROGRESS)', body, re.I)
              status = m.group(1).upper() if m else 'IN PROGRESS'
              items = len(re.findall(r'^##\s+\[', body, re.M))
              try:
                  import markdown
                  report_html = markdown.markdown(body, extensions=['extra','sane_lists','nl2br'])
              except Exception:
                  import html as _h
                  esc = _h.escape(body)
                  esc = re.sub(r'\[(.+?)\]\((https?://[^\s)]+)\)', r'<a href="\2">\1</a>', esc)
                  report_html = '<pre style="white-space:pre-wrap;font-family:inherit">' + esc + '</pre>'

          gh = f"https://github.com/Sunnylittlehand/ClaudeCode/blob/main/anthropic-research/sessions-{today}.md"
          html = (
              '<div style="font-family:-apple-system,Segoe UI,sans-serif;max-width:720px;margin:0 auto;color:#1d1d1f">'
              '<div style="background:#f5f5f7;border-radius:12px;padding:16px 20px;margin-bottom:24px">'
              f'<h2 style="margin:0 0 6px">AI Intelligence Report &mdash; {status}</h2>'
              f'<p style="margin:0;color:#6e6e73;font-size:14px">{start} to {today} &nbsp;|&nbsp; {items} items &nbsp;|&nbsp; Anthropic &middot; OpenAI &middot; Codex &middot; Karpathy</p>'
              '</div>'
              f'<div style="line-height:1.55">{report_html}</div>'
              f'<p style="margin-top:28px;padding-top:16px;border-top:1px solid #e5e5e5;font-size:13px;color:#6e6e73">Full version on <a href="{gh}">GitHub</a>.</p>'
              '</div>'
          )

          print(json.dumps({
              'from': 'AI Research Agent <onboarding@resend.dev>',
              'to': ['sunny.shan.sun@gmail.com'],
              'subject': f'[AI Intelligence] {status} — {today} ({items} items)',
              'html': html,
          }))
          PYEOF
          echo "Payload built, $(wc -c < /tmp/email.json) bytes"

      - name: Send via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY secret is not set. Add it under repo Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          HTTP=$(curl -s -o /tmp/resp.json -w '%{http_code}' -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -H 'User-Agent: curl/7.88.1' \
            --data @/tmp/email.json)
          echo "Resend HTTP $HTTP"
          cat /tmp/resp.json
          [ "$HTTP" = "200" ] || exit 1
